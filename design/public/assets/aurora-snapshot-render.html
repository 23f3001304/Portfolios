<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora Snapshot Renderer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0a0d12;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="aurora"></canvas>
    <script>
      const VERT = `
        attribute vec2 a_pos;
        varying vec2 v_uv;
        void main() {
          v_uv = a_pos * 0.5 + 0.5;
          gl_Position = vec4(a_pos, 0.0, 1.0);
        }
      `

      const FRAG = `
        precision highp float;
        varying vec2 v_uv;
        uniform float u_time;
        uniform vec2 u_res;
        uniform vec2 u_mouse;
        uniform vec3 u_paper;
        uniform vec3 u_ink;
        uniform vec3 u_rust;
        uniform vec3 u_accent;
        uniform float u_intensity;

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        float vnoise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(
            mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), u.x),
            mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
            u.y
          );
        }
        float fbm(vec2 p) {
          float v = 0.0;
          float a = 0.5;
          mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
          for (int i = 0; i < 3; i++) {
            v += a * vnoise(p);
            p = rot * p * 2.02;
            a *= 0.5;
          }
          return v;
        }

        void main() {
          vec2 uv = v_uv;
          uv.x *= u_res.x / u_res.y;

          float t = u_time * 0.3;
          vec2 mouseUv = u_mouse;
          mouseUv.x *= u_res.x / u_res.y;
          vec2 toMouse = mouseUv - uv;
          float mouseDist = length(toMouse);
          float mouseInfluence = exp(-mouseDist * 2.0) * 0.25;

          vec2 p1 = uv * 0.7 + vec2(t * 0.3, t * 0.15);
          float cloud1 = fbm(p1);

          vec2 p2 = uv * 1.5 + vec2(t * 0.4, -t * 0.25);
          float cloud2 = fbm(p2);

          vec2 p3 = uv * 2.8 + vec2(-t * 0.2, t * 0.15);
          float cloud3 = fbm(p3);

          float cloudDensity = cloud1 * 0.5 + cloud2 * 0.3 + cloud3 * 0.2;
          cloudDensity += mouseInfluence * 0.5;

          float softCloud = smoothstep(0.2, 0.8, cloudDensity);
          float cloudEdges = smoothstep(0.3, 0.6, cloudDensity) * (1.0 - smoothstep(0.7, 0.95, cloudDensity));

          vec3 col = u_paper;
          col = mix(col, u_accent * 0.35, softCloud * 0.55);
          col = mix(col, u_accent * 0.7, cloudEdges * 0.4);
          float denseShadow = smoothstep(0.65, 0.95, cloudDensity);
          col = mix(col, u_rust * 0.3, denseShadow * 0.4);
          vec3 mouseGlow = u_accent * 0.45 * exp(-mouseDist * 1.5);
          col = col + mouseGlow * softCloud * 0.35;

          vec2 d = v_uv - 0.5;
          float vig = 1.0 - smoothstep(0.4, 1.15, length(d));
          col *= mix(0.75, 1.0, vig);
          col = max(col, u_paper);
          col = mix(u_paper, col, u_intensity);

          gl_FragColor = vec4(col, 1.0);
        }
      `

      function compile(gl, type, src) {
        const shader = gl.createShader(type)
        gl.shaderSource(shader, src)
        gl.compileShader(shader)
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(shader))
        }
        return shader
      }

      function hexToVec3(hex) {
        const n = parseInt(hex.replace('#', ''), 16)
        return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255]
      }

      const PAPER = hexToVec3('#0A0D12')
      const INK = hexToVec3('#EDE7DC')
      const RUST = hexToVec3('#A98B69')
      const ACCENT = hexToVec3('#7BA4C7')

      const canvas = document.getElementById('aurora')
      const gl = canvas.getContext('webgl', { alpha: false, antialias: false, premultipliedAlpha: true })

      function resize() {
        const dpr = 1
        canvas.width = Math.floor(window.innerWidth * dpr)
        canvas.height = Math.floor(window.innerHeight * dpr)
        gl.viewport(0, 0, canvas.width, canvas.height)
      }

      const program = gl.createProgram()
      gl.attachShader(program, compile(gl, gl.VERTEX_SHADER, VERT))
      gl.attachShader(program, compile(gl, gl.FRAGMENT_SHADER, FRAG))
      gl.linkProgram(program)
      gl.useProgram(program)

      const buffer = gl.createBuffer()
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer)
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW)

      const aPos = gl.getAttribLocation(program, 'a_pos')
      gl.enableVertexAttribArray(aPos)
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0)

      const uniforms = {
        time: gl.getUniformLocation(program, 'u_time'),
        res: gl.getUniformLocation(program, 'u_res'),
        mouse: gl.getUniformLocation(program, 'u_mouse'),
        paper: gl.getUniformLocation(program, 'u_paper'),
        ink: gl.getUniformLocation(program, 'u_ink'),
        rust: gl.getUniformLocation(program, 'u_rust'),
        accent: gl.getUniformLocation(program, 'u_accent'),
        intensity: gl.getUniformLocation(program, 'u_intensity'),
      }

      function render() {
        resize()
        gl.uniform1f(uniforms.time, 2.15)
        gl.uniform2f(uniforms.res, canvas.width, canvas.height)
        gl.uniform2f(uniforms.mouse, 0.56, 0.52)
        gl.uniform3fv(uniforms.paper, PAPER)
        gl.uniform3fv(uniforms.ink, INK)
        gl.uniform3fv(uniforms.rust, RUST)
        gl.uniform3fv(uniforms.accent, ACCENT)
        gl.uniform1f(uniforms.intensity, 1.0)
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
        gl.finish()
      }

      render()
      window.addEventListener('resize', render)
    </script>
  </body>
</html>
